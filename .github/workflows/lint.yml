name: PowerShell Linting

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -AcceptLicense -Local
          $results = Invoke-ScriptAnalyzer -Path .\cleanup.ps1 -Settings .\PSScriptAnalyzerSettings.psd1
          if ($results) {
              $results | Format-Table
              Write-Warning "PSScriptAnalyzer found linting issues. Please review them."
              exit 1
          } else {
              Write-Output "✅ PSScriptAnalyzer passed successfully! Code is clean."
          }
